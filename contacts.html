<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Контактна інформація та форма зворотного зв'язку">
    <meta name="author" content="Ваше Ім'я">
    <title>Контакти - Портфоліо</title>
</head>
<body>
    <header>
        <h1>Моє Портфоліо</h1>
        <nav>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="about.html">Про мене</a></li>
                <li>Контакти</li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Зв'язатися зі мною</h2>
            <p>Email: <a href="mailto:email@example.com">email@example.com</a></p>
            <p>Телефон: <a href="tel:+380123456789">+38 (012) 345-67-89</a></p>

            <form action="#" method="post">
                <fieldset>
                    <legend>Контактні дані</legend>
                    
                    <label for="name">Ім'я:</label>
                    <input type="text" id="name" name="name" placeholder="Ваше ім'я" required><br><br>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </fieldset>

                <fieldset>
                    <legend>Деталі повідомлення</legend>

                    <label for="subject">Тема звернення:</label>
                    <select id="subject" name="subject" required>
                        <option value="">-- Оберіть тему --</option>
                        <option value="job">Пропозиція роботи</option>
                        <option value="project">Спільний проєкт</option>
                        <option value="other">Інше</option>
                    </select><br><br>

                    <p>Тип звернення:</p>
                    <label>
                        <input type="radio" name="type" value="question" required> Питання
                    </label>
                    <label>
                        <input type="radio" name="type" value="suggestion"> Пропозиція
                    </label><br><br>

                    <label for="message">Повідомлення:</label><br>
                    <textarea id="message" name="message" rows="5" cols="40" placeholder="Напишіть ваше повідомлення тут..." required></textarea>
                </fieldset>

                <label>
                    <input type="checkbox" name="consent" required>
                    Я погоджуюсь на обробку персональних даних
                </label><br><br>

                <button type="submit">Надіслати повідомлення</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ваше Ім'я. Всі права захищені.</p>
    </footer>
</body>
</html>
