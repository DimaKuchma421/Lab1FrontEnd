<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторна робота 4 - JavaScript</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.6;
      background: #f5f7fb;
      color: #222;
    }

    main {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    .info {
      padding: 12px 16px;
      background: #eaf3ff;
      border-left: 4px solid #2b7de9;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    #output {
      white-space: pre-wrap;
      background: #111827;
      color: #e5e7eb;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: Consolas, monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Лабораторна робота 4</h1>
    <h2>JavaScript: основи та логіка</h2>

    <div class="info">
      <p><strong>Студент:</strong> Дмитро Кучмамбетов</p>
      <p><strong>Група:</strong> 136</p>
      <p>Результати виконання завдань виводяться у консоль браузера та дублюються нижче на сторінці.</p>
    </div>

    <h2>Результати:</h2>
    <pre id="output"></pre>
  </main>

  <script src="script.js"></script>
</body>
</html>
